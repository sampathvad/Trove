name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build and test
        run: |
          xcodebuild test \
            -scheme Trove \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload results
        uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: test-results
          path: TestResults.xcresult

  release:
    name: Build release
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    permissions:
      contents: write
    # `secrets` can't be used in step `if:` conditions, so hoist the check into
    # a job-level env var (job env may reference secrets) and gate steps on it.
    env:
      SIGN: ${{ secrets.MACOS_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v6.0.2

      # ---- Signed + notarized path (runs only when signing secrets exist) ----
      - name: Import Developer ID certificate
        if: ${{ env.SIGN == 'true' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign & export (Developer ID)
        if: ${{ env.SIGN == 'true' }}
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild archive \
            -scheme Trove \
            -archivePath build/Trove.xcarchive \
            -destination 'generic/platform=macOS' \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${DEVELOPMENT_TEAM}</string>
            <key>signingStyle</key><string>manual</string>
          </dict></plist>
          PLIST
          # -exportArchive re-signs the app AND its nested code (the Sparkle
          # framework + its XPC services) inside-out, which manual codesign
          # cannot do reliably.
          xcodebuild -exportArchive \
            -archivePath build/Trove.xcarchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath build/export
          cp -R "build/export/Trove.app" "build/Trove.app"

      # ---- Unsigned fallback (no secrets: keeps forks / dry-runs working) ----
      - name: Build archive (unsigned)
        if: ${{ env.SIGN == 'false' }}
        run: |
          xcodebuild archive \
            -scheme Trove \
            -archivePath build/Trove.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          cp -R "build/Trove.xcarchive/Products/Applications/Trove.app" "build/Trove.app"

      - name: Create DMG
        run: |
          hdiutil create -volname Trove \
            -srcfolder build/Trove.app \
            -ov -format UDZO \
            build/Trove.dmg
      - name: Notarize & staple DMG
        if: ${{ env.SIGN == 'true' }}
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          # Submit the DMG (which embeds the signed app) and block until Apple
          # returns a verdict, then staple the ticket so Gatekeeper validates
          # offline.
          xcrun notarytool submit build/Trove.dmg \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple build/Trove.dmg
      - name: Generate & sign Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret not set — skipping appcast (DMG still ships)."
            exit 0
          fi
          SPARKLE_VERSION=2.6.4
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          # generate_appcast scans build/ for archives and writes build/appcast.xml,
          # pointing enclosure URLs at this tag's release assets.
          "$RUNNER_TEMP/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            build/
          rm -f "$RUNNER_TEMP/sparkle_key"
      - name: Upload to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            build/Trove.dmg
            build/appcast.xml
