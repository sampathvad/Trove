name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build and test
        run: |
          xcodebuild test \
            -scheme Trove \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload results
        uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: test-results
          path: TestResults.xcresult

  release:
    name: Build release
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -scheme Trove \
            -archivePath build/Trove.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Extract .app from archive
        run: |
          cp -R "build/Trove.xcarchive/Products/Applications/Trove.app" "build/Trove.app"
      - name: Create DMG
        run: |
          hdiutil create -volname Trove \
            -srcfolder build/Trove.app \
            -ov -format UDZO \
            build/Trove.dmg
      - name: Generate & sign Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret not set — skipping appcast (DMG still ships)."
            exit 0
          fi
          SPARKLE_VERSION=2.6.4
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          # generate_appcast scans build/ for archives and writes build/appcast.xml,
          # pointing enclosure URLs at this tag's release assets.
          "$RUNNER_TEMP/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            build/
          rm -f "$RUNNER_TEMP/sparkle_key"
      - name: Upload to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            build/Trove.dmg
            build/appcast.xml
