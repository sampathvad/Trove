name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint

  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: xcodebuild test -scheme Trove -destination 'platform=macOS' -resultBundlePath TestResults.xcresult
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: TestResults.xcresult

  release:
    name: Build release
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -scheme Trove \
            -archivePath build/Trove.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Extract .app from archive
        run: |
          cp -R "build/Trove.xcarchive/Products/Applications/Trove.app" "build/Trove.app"
      - name: Create DMG
        run: |
          hdiutil create -volname Trove \
            -srcfolder build/Trove.app \
            -ov -format UDZO \
            build/Trove.dmg
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Trove.dmg
