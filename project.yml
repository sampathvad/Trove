name: Trove
options:
  bundleIdPrefix: app.trove
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.13"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: app.trove.Trove
    DEVELOPMENT_TEAM: ""  # fill in your team ID (or override in CI)
    # Hardened runtime is a prerequisite for notarization. Harmless on
    # unsigned/local builds — it only takes effect once the app is signed.
    ENABLE_HARDENED_RUNTIME: "YES"

targets:
  Trove:
    type: application
    platform: macOS
    sources:
      - path: Trove
    settings:
      base:
        INFOPLIST_FILE: Trove/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Trove/Resources/Trove.entitlements
        PRODUCT_NAME: Trove
    dependencies:
      - package: Sparkle

  TroveTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TroveTests
    dependencies:
      - target: Trove

  TroveUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TroveUITests
    dependencies:
      - target: Trove

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

schemes:
  Trove:
    build:
      targets:
        Trove: all
    run:
      config: Debug
    test:
      targets:
        - TroveTests
        - TroveUITests
    archive:
      config: Release
